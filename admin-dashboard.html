<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #f1f5f9;
  padding: 20px;
  min-height: 100vh;
}

.header {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 20px;
  text-align: center;
  background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.form {
  background: linear-gradient(145deg, #1e293b 0%, #334155 100%);
  padding: 20px;
  border-radius: 15px;
  display: flex;
  gap: 15px;
  align-items: center;
  margin-bottom: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
}

input {
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 16px;
  flex: 1;
  min-width: 200px;
}

input::placeholder {
  color: #94a3b8;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color: white;
  font-weight: 600;
  font-size: 16px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(34,197,94,0.3);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(34,197,94,0.4);
}

.note {
  color: #cbd5e1;
  margin-bottom: 15px;
  font-size: 14px;
  text-align: center;
}

.summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 15px;
  margin-bottom: 30px;
}

.summary-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 18px;
  border-radius: 14px;
  text-align: center;
}

.summary-card strong {
  display: block;
  font-size: 24px;
  margin-bottom: 6px;
  color: #f1f5f9;
}

.summary-card div {
  color: #cbd5e1;
  font-size: 13px;
}

.card {
  background: linear-gradient(145deg, #1e293b 0%, #334155 100%);
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.3);
}

.card-info {
  flex: 1;
}

.card-info strong {
  font-size: 18px;
  color: #f1f5f9;
  display: block;
  margin-bottom: 5px;
}

.card-info div {
  color: #cbd5e1;
  margin-bottom: 3px;
  font-size: 14px;
}

.status {
  font-weight: 600;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  text-transform: uppercase;
}

.status-pending { background: #facc15; color: #1f2937; }
.status-paid { background: #22c55e; color: white; }
.status-none { background: #ef4444; color: white; }

.card-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

select {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 14px;
  outline: none;
}

select option {
  background: #1e293b;
  color: white;
}

.delete-btn {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  color: white;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.3s ease;
}

.delete-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(239,68,68,0.4);
}

.no-data {
  text-align: center;
  color: #94a3b8;
  font-style: italic;
  margin-top: 50px;
}
</style>
</head>

<body>

<div class="header">👑 Kasipag Admin Dashboard</div>
<div class="note">Assign payments to riders here. All assignments and pending collections are visible to riders and the cashier in real time.</div>
<div class="summary">
  <div class="summary-card">
    <strong id="totalCount">0</strong>
    <div>Total Records</div>
  </div>
  <div class="summary-card">
    <strong id="assignedCount">0</strong>
    <div>Assigned to Riders</div>
  </div>
  <div class="summary-card">
    <strong id="pendingCount">0</strong>
    <div>Pending Cashier</div>
  </div>
  <div class="summary-card">
    <strong id="paidCount">0</strong>
    <div>Paid</div>
  </div>
</div>

<!-- FORM -->
<div class="form">
  <input id="name" placeholder="Customer Name" required>
  <input id="amount" placeholder="Loan Amount (₱)" type="number" min="0" required>
  <button onclick="addCustomer()">Add Customer</button>
</div>

<!-- LIST -->
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app",
  storageBucket: "kasipag-app.firebasestorage.app",
  messagingSenderId: "442166485005",
  appId: "1:442166485005:web:ed07396b8a59006efa3544",
  measurementId: "G-SJQKE0F3H0"
};

if (localStorage.getItem("role") !== "admin") {
  window.location.href = "/index.html";
}

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ADD CUSTOMER */
function addCustomer() {
  let name = document.getElementById("name").value.trim();
  let amount = parseFloat(document.getElementById("amount").value);

  if (!name || isNaN(amount) || amount <= 0) {
    alert("Please enter valid customer name and amount");
    return;
  }

  db.collection("payments").add({
    name: name,
    amount: amount,
    assignedTo: "",
    status: "New",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";
}

/* ASSIGN RIDER */
function assignRider(docId, rider) {
  db.collection("payments").doc(docId).update({
    assignedTo: rider
  });
}

/* DELETE PAYMENT */
function deletePayment(docId) {
  if (confirm("Are you sure you want to delete this payment?")) {
    db.collection("payments").doc(docId).delete();
  }
}

function updateSummary(total, assigned, pending, paid) {
  document.getElementById("totalCount").textContent = total;
  document.getElementById("assignedCount").textContent = assigned;
  document.getElementById("pendingCount").textContent = pending;
  document.getElementById("paidCount").textContent = paid;
}

/* REAL-TIME LIST */
db.collection("payments").orderBy("createdAt", "desc").onSnapshot(snapshot => {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;
  let assigned = 0;
  let pending = 0;
  let paid = 0;

  if (snapshot.empty) {
    list.innerHTML = '<div class="no-data">No payments found. Add a customer to get started.</div>';
    updateSummary(0, 0, 0, 0);
    return;
  }

  snapshot.forEach(doc => {
    total += 1;
    let d = doc.data();
    if (d.assignedTo) assigned += 1;
    if (d.status === "Pending") pending += 1;
    if (d.status === "Paid") paid += 1;
    let docId = doc.id;

    let statusClass = "status-none";
    if (d.status === "Pending") statusClass = "status-pending";
    if (d.status === "Paid") statusClass = "status-paid";

    list.innerHTML += `
      <div class="card">
        <div class="card-info">
          <strong>${d.name}</strong>
          <div>Amount: ₱${d.amount.toLocaleString()}</div>
          <div>Rider Assigned: ${d.assignedTo || "Not Assigned"}</div>
          <div>Status: <span class="status ${statusClass}">${d.status}</span></div>
        </div>
        <div class="card-actions">
          <select onchange="assignRider('${docId}', this.value)">

<body>

<!-- LOGOUT -->
<button class="logout" onclick="logout()">🚪 Logout</button>

<div class="header">👑 Kasipag Admin Dashboard</div>
<div class="note">REALTIME MICROFINANCE SYSTEM (Admin Control Panel)</div>

<div class="summary">
  <div class="summary-card">
    <strong id="totalCount">0</strong>
    <div>Total</div>
  </div>
  <div class="summary-card">
    <strong id="pendingCount">0</strong>
    <div>Pending</div>
  </div>
  <div class="summary-card">
    <strong id="collectedCount">0</strong>
    <div>Collected</div>
  </div>
  <div class="summary-card">
    <strong id="paidCount">0</strong>
    <div>Paid</div>
  </div>
</div>

<div class="form">
  <input id="name" placeholder="Customer Name">
  <input id="amount" placeholder="Amount">
  <button onclick="addCustomer()">Add</button>
</div>

<div id="list"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* SECURITY */
if(localStorage.getItem("role") !== "admin"){
  window.location.href = "index.html";
}

/* ADD */
function addCustomer(){
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  db.collection("payments").add({
    name,
    amount:Number(amount),
    rider:"",
    status:"Pending"
  });

  document.getElementById("name").value="";
  document.getElementById("amount").value="";
}

/* ASSIGN RIDER */
function assignRider(id,rider){
  db.collection("payments").doc(id).update({
    rider:rider
  });
}

/* STATUS */
function setStatus(id,status){
  db.collection("payments").doc(id).update({
    status:status
  });
}

/* DELETE */
function deleteItem(id){
  db.collection("payments").doc(id).delete();
}

/* REALTIME */
db.collection("payments").onSnapshot(snapshot=>{

  let list=document.getElementById("list");
  list.innerHTML="";

  let total=0,pending=0,collected=0,paid=0;

  snapshot.forEach(doc=>{
    let d=doc.data();
    let id=doc.id;

    total++;
    if(d.status==="Pending") pending++;
    if(d.status==="Collected") collected++;
    if(d.status==="Paid") paid++;

    list.innerHTML+=`
      <div class="card">
        <div>
          <b>${d.name}</b><br>
          ₱${d.amount}<br>
          Rider: ${d.rider || "None"}<br>
          <span class="${d.status}">${d.status}</span>
        </div>

        <div>
          <select onchange="assignRider('${id}',this.value)">
            <option value="">Assign Rider</option>
            <option>Rider 1</option>
            <option>Rider 2</option>
            <option>Rider 3</option>
          </select>

          <button onclick="setStatus('${id}','Collected')">Collected</button>
          <button onclick="setStatus('${id}','Paid')">Paid</button>
          <button class="delete-btn" onclick="deleteItem('${id}')">Delete</button>
        </div>
      </div>
    `;
  });

  document.getElementById("totalCount").innerText=total;
  document.getElementById("pendingCount").innerText=pending;
  document.getElementById("collectedCount").innerText=collected;
  document.getElementById("paidCount").innerText=paid;
});

/* LOGOUT */
function logout(){
  if(confirm("Logout now?")){
    localStorage.removeItem("role");
    window.location.href="index.html";
  }
}

</script>

</body>

            <option value="Rider 3" ${d.assignedTo === "Rider 3" ? "selected" : ""}>Rider 3</option>
          </select>
          <button class="delete-btn" onclick="deletePayment('${docId}')">Delete</button>
        </div>
      </div>
    `;
  });

  updateSummary(total, assigned, pending, paid);
});
</script>
