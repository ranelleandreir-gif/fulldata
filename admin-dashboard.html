<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #f1f5f9;
  padding: 20px;
  min-height: 100vh;
}

.header {
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 10px;
}

.note {
  text-align: center;
  font-size: 13px;
  color: #cbd5e1;
  margin-bottom: 20px;
}

.summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.summary-card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.summary-card strong {
  font-size: 20px;
  display: block;
}

.form {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.card {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-info {
  flex: 1;
}

.status {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.status-pending { background: #facc15; color: #000; }
.status-paid { background: #22c55e; }

select {
  padding: 6px;
  border-radius: 6px;
  margin-right: 5px;
  background: #0f172a;
  color: white;
}

.delete-btn {
  background: #ef4444;
}
</style>
</head>

<body>

<div class="header">👑 Kasipag Admin Dashboard</div>
<div class="note">Real-time Microfinance System (Admin Control Panel)</div>

<!-- FINANCE SETTINGS -->
<div class="summary">
  <div class="summary-card">
    <strong id="scheduleText"></strong>
    <div>Collection Schedule</div>
  </div>
  <div class="summary-card">
    <strong>₱50</strong>
    <div>Collection Fee</div>
  </div>
  <div class="summary-card">
    <strong>10%</strong>
    <div>Rider Commission</div>
  </div>
  <div class="summary-card">
    <strong id="totalCount">0</strong>
    <div>Total Loans</div>
  </div>
</div>

<!-- FORM -->
<div class="form">
  <input id="name" placeholder="Customer Name">
  <input id="amount" placeholder="Loan Amount">
  <button onclick="addCustomer()">Add</button>
</div>

<div id="list"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app",
  storageBucket: "kasipag-app.firebasestorage.app",
  messagingSenderId: "442166485005",
  appId: "1:442166485005:web:ed07396b8a59006efa3544"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 SETTINGS
const systemSettings = {
  schedule: "Mon–Fri (8:00 AM - 5:00 PM)",
  riderCommission: 10,
  collectionFee: 50
};

document.getElementById("scheduleText").innerText = systemSettings.schedule;

// 🔒 ACCESS CHECK
if(localStorage.getItem("role") !== "admin"){
  window.location.href = "/index.html";
}

// ➕ ADD CUSTOMER
function addCustomer(){
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  if(!name || !amount) return alert("Fill all fields");

  db.collection("payments").add({
    name,
    amount: Number(amount),
    assignedTo: "",
    status: "Pending",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";
}

// 🚴 ASSIGN RIDER
function assignRider(id, rider){
  db.collection("payments").doc(id).update({
    assignedTo: rider
  });
}

// 🗑 DELETE
function deletePayment(id){
  db.collection("payments").doc(id).delete();
}

// 💰 COMPUTE RIDER INCOME
function computeIncome(amount){
  return (amount * systemSettings.riderCommission) / 100;
}

// 🔄 REAL-TIME
db.collection("payments").orderBy("createdAt","desc")
.onSnapshot(snapshot => {

  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;

  snapshot.forEach(doc => {
    total++;
    let d = doc.data();
    let id = doc.id;

    let income = computeIncome(d.amount);

    list.innerHTML += `
    <div class="card">
      <div class="card-info">
        <b>${d.name}</b><br>
        ₱${d.amount}<br>
        🚴 Rider: ${d.assignedTo || "Not Assigned"}<br>
        💰 Rider Income: ₱${income.toFixed(2)}<br>
        <span class="status status-pending">${d.status}</span>
      </div>

      <div>
        <select onchange="assignRider('${id}', this.value)">
          <option value="">Assign Rider</option>
          <option>Rider 1</option>
          <option>Rider 2</option>
          <option>Rider 3</option>
        </select>

        <button class="delete-btn" onclick="deletePayment('${id}')">Delete</button>
      </div>
    </div>
    `;
  });

  document.getElementById("totalCount").innerText = total;
});

</script>

</body>
</html>
