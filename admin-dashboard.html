<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Inter;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#f1f5f9;
  padding:20px;
}

.header{
  text-align:center;
  font-size:26px;
  font-weight:700;
}

.tabs{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:15px 0;
}

.tab{
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  background:#334155;
}

.active{
  background:#22c55e;
}

.card{
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.status{
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
}

.pending{background:#facc15;color:#000}
.collected{background:#3b82f6}
.approved{background:#22c55e}

button,select{
  margin-top:5px;
  padding:6px;
  border-radius:6px;
  border:none;
}

.bin{
  background:#ef4444;
  color:white;
}
</style>
</head>

<body>

<div class="header">👑 ADMIN DASHBOARD (REALTIME)</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="setView('pending')">Pending</div>
  <div class="tab" onclick="setView('collected')">Collected</div>
  <div class="tab" onclick="setView('approved')">Approved</div>
  <div class="tab" onclick="setView('bin')">Bin</div>
</div>

<div id="list"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let view = "pending";

/* CHECK ADMIN */
if(localStorage.getItem("role") !== "admin"){
  window.location.href="index.html";
}

/* CHANGE TAB */
function setView(v){
  view = v;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");

  render();
}

/* ASSIGN RIDER */
function assignRider(id, rider){
  db.collection("loans").doc(id).update({
    rider:rider
  });
}

/* STATUS CHANGE */
function updateStatus(id,status){
  db.collection("loans").doc(id).update({
    status:status
  });
}

/* MOVE TO BIN */
function deleteLoan(id){
  db.collection("loans").doc(id).update({
    status:"bin"
  });
}

/* REALTIME */
db.collection("loans").onSnapshot(snapshot=>{
  window.data = snapshot.docs;
  render();
});

/* RENDER */
function render(){

  let list = document.getElementById("list");
  list.innerHTML="";

  window.data.forEach(doc=>{
    let d = doc.data();
    let id = doc.id;

    if(d.status !== view) return;

    list.innerHTML += `
      <div class="card">
        <b>${d.name}</b><br>
        ₱${d.amount}<br>

        <span class="status ${d.status}">${d.status}</span><br><br>

        🚴 Rider: ${d.rider || "Not Assigned"}<br>

        <select onchange="assignRider('${id}',this.value)">
          <option>Rider 1</option>
          <option>Rider 2</option>
          <option>Rider 3</option>
        </select>

        <br>

        ${view==="pending"
          ? `<button onclick="updateStatus('${id}','collected')">Mark Collected</button>`
          : ""}

        ${view==="collected"
          ? `<button onclick="updateStatus('${id}','approved')">Approve</button>`
          : ""}

        <button class="bin" onclick="deleteLoan('${id}')">Move to Bin</button>

      </div>
    `;
  });
}

</script>

</body>
</html>
